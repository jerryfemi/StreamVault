<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamVault Icon Design</title>
    <style>
        :root {
            --bg-color: #0A0A0C;
            --surface-color: #141418;
            --accent-red: #E5383B;
            --accent-glow: rgba(229, 56, 59, 0.4);
            --border-color: rgba(255, 255, 255, 0.1);
            --icon-size: 512px;
        }

        body {
            background-color: var(--bg-color);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Inter', sans-serif;
        }

        .icon-container {
            width: var(--icon-size);
            height: var(--icon-size);
            background: linear-gradient(135deg, var(--surface-color) 0%, #0d0d12 100%);
            border-radius: 0;
            box-shadow: 
                0 20px 50px rgba(0, 0, 0, 0.5),
                inset 0 2px 5px var(--border-color),
                inset 0 -2px 10px rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.05);
        }

        /* Vault Door Ring */
        .vault-ring {
            position: absolute;
            width: 70%;
            height: 70%;
            border-radius: 50%;
            border: 8px solid rgba(255, 255, 255, 0.05);
            background: linear-gradient(145deg, #1c1c22 0%, #141418 100%);
            box-shadow: 
                inset 0 10px 20px rgba(0,0,0,0.5),
                0 5px 15px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Vault Locking Mechanisms (Dots around the ring) */
        .vault-bolts {
            position: absolute;
            width: 100%;
            height: 100%;
            animation: rotate 60s linear infinite;
        }

        .bolt {
            position: absolute;
            width: 16px;
            height: 16px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            box-shadow: inset 0 -2px 5px rgba(0,0,0,0.5);
            top: 50%;
            left: 50%;
            margin: -8px 0 0 -8px;
        }
        
        .bolt:nth-child(1) { transform: rotate(0deg) translateY(-145px); }
        .bolt:nth-child(2) { transform: rotate(45deg) translateY(-145px); }
        .bolt:nth-child(3) { transform: rotate(90deg) translateY(-145px); }
        .bolt:nth-child(4) { transform: rotate(135deg) translateY(-145px); }
        .bolt:nth-child(5) { transform: rotate(180deg) translateY(-145px); }
        .bolt:nth-child(6) { transform: rotate(225deg) translateY(-145px); }
        .bolt:nth-child(7) { transform: rotate(270deg) translateY(-145px); }
        .bolt:nth-child(8) { transform: rotate(315deg) translateY(-145px); }

        /* Inner Glowing Play Button */
        .play-button {
            position: relative;
            z-index: 10;
            width: 120px;
            height: 120px;
            background: var(--accent-red);
            clip-path: polygon(15% 0, 100% 50%, 15% 100%);
            box-shadow: 0 0 50px var(--accent-glow);
            margin-left: 20px; /* Optical center adjustment */
            transition: all 0.3s ease;
        }

        .play-glow {
            position: absolute;
            width: 140px;
            height: 140px;
            background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
            z-index: 5;
            mix-blend-mode: screen;
            animation: pulse 3s ease-in-out infinite;
        }

        /* Signal Waves emitting from the vault */
        .signal-wave {
            position: absolute;
            border-radius: 50%;
            border: 2px solid var(--accent-red);
            opacity: 0;
            z-index: 1;
            animation: wave 3s cubic-bezier(0.2, 0.8, 0.2, 1) infinite;
        }

        .signal-wave:nth-child(1) { width: 100px; height: 100px; animation-delay: 0s; }
        .signal-wave:nth-child(2) { width: 100px; height: 100px; animation-delay: 1s; }
        .signal-wave:nth-child(3) { width: 100px; height: 100px; animation-delay: 2s; }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.5); opacity: 1; }
            100% { transform: scale(1); opacity: 0.5; }
        }

        @keyframes wave {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(3.5); opacity: 0; }
        }

        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .title {
            margin-top: 40px;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.7);
        }

        .subtitle {
            margin-top: 10px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.4);
        }
    </style>
</head>
<body>

    <div class="icon-container">
        <!-- Signal Waves -->
        <div class="signal-wave"></div>
        <div class="signal-wave"></div>
        <div class="signal-wave"></div>

        <!-- Vault Door -->
        <div class="vault-ring">
            <div class="vault-bolts">
                <div class="bolt"></div>
                <div class="bolt"></div>
                <div class="bolt"></div>
                <div class="bolt"></div>
                <div class="bolt"></div>
                <div class="bolt"></div>
                <div class="bolt"></div>
                <div class="bolt"></div>
            </div>
            
            <!-- Center Play Icon -->
            <div class="play-glow"></div>
            <div class="play-button"></div>
        </div>
    </div>

    <div class="title">STREAM VAULT</div>
    <div class="subtitle">HTML / CSS ICON DESIGN</div>

</body>
</html>
